<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能客服 - 在线演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .header-left p {
            font-size: 13px;
            opacity: 0.9;
        }

        .header-badge {
            background: rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* 消息区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-end; }

        .message-content {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.7;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: none;
            padding: 14px 18px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            width: fit-content;
            margin-bottom: 20px;
        }

        .typing-indicator.active { display: block; }

        .typing-dots {
            display: flex;
            gap: 5px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #adb5bd;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* 输入区域 */
        .chat-input {
            padding: 20px 25px;
            background: white;
            border-top: 1px solid #e9ecef;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e9ecef;
            border-radius: 14px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-wrapper input:focus { border-color: #667eea; }

        .input-wrapper button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-wrapper button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .input-wrapper button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .quick-questions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .quick-question {
            padding: 8px 16px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-question:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* 技术标签 */
        .tech-tags {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .tech-tag {
            background: rgba(255,255,255,0.15);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
        }

        @media (max-width: 768px) {
            .chat-container { height: 100vh; border-radius: 0; }
            .message-content { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-left">
                <h1>🤖 AI智能客服</h1>
                <p>基于agno框架 · 知识库增强</p>
            </div>
            <div class="header-badge">演示模式</div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-content">
                    <p>👋 您好！我是AI智能客服助手。</p>
                    <p style="margin-top: 12px;">我可以帮您：</p>
                    <ul style="margin: 10px 0; padding-left: 20px;">
                        <li>回答常见问题</li>
                        <li>基于知识库提供专业解答</li>
                        <li>支持多轮对话</li>
                    </ul>
                    <p>请问有什么可以帮您？</p>
                </div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="chat-input">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="输入您的问题..." autocomplete="off">
                <button id="sendButton" onclick="sendMessage()">发送</button>
            </div>
            <div class="quick-questions">
                <span class="quick-question" onclick="quickAsk('你好，请介绍一下自己')">你好</span>
                <span class="quick-question" onclick="quickAsk('你能做什么？')">功能介绍</span>
                <span class="quick-question" onclick="quickAsk('如何使用知识库？')">知识库</span>
                <span class="quick-question" onclick="quickAsk('技术支持')">技术支持</span>
            </div>
        </div>
    </div>

    <div class="tech-tags">
        <span class="tech-tag">agno</span>
        <span class="tech-tag">FastAPI</span>
        <span class="tech-tag">LangChain</span>
        <span class="tech-tag">PGVector</span>
        <span class="tech-tag">RAG</span>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        let userId = 'demo_' + Date.now();

        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            messageInput.value = '';
            sendButton.disabled = true;

            // 添加空的助手消息用于流式更新
            const assistDiv = addMessage('', 'assistant');
            typingIndicator.classList.add('active');
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const response = await fetch(API_BASE_URL + '/api/agent/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        user_id: userId
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullReply = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.type === 'chunk' && data.content) {
                                    fullReply += data.content;
                                    assistDiv.querySelector('.message-content').innerHTML = formatMessage(fullReply);
                                    chatMessages.scrollTop = chatMessages.scrollHeight;
                                } else if (data.type === 'error') {
                                    assistDiv.querySelector('.message-content').innerHTML = '抱歉，处理请求时出现错误：' + data.error;
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (error) {
                assistDiv.querySelector('.message-content').innerHTML = '网络连接出现问题，请稍后重试。';
                console.error('Error:', error);
            }

            typingIndicator.classList.remove('active');
            sendButton.disabled = false;
            messageInput.focus();
        }

        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<div class="message-content">${formatMessage(content)}</div>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return messageDiv;
        }

        function formatMessage(content) {
            return content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code style="background:#f0f0f0;padding:2px 4px;border-radius:3px;">$1</code>')
                .replace(/\n/g, '<br>');
        }

        function quickAsk(question) {
            messageInput.value = question;
            sendMessage();
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        window.addEventListener('load', () => messageInput.focus());
    </script>
</body>
</html>
