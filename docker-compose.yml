services:
  # PostgreSQL数据库
  postgres:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/pgvector/pgvector:pg16
    container_name: ai-postgres
    environment:
      POSTGRES_DB: ai_service
      POSTGRES_USER: ai_admin
      POSTGRES_PASSWORD: ai_password_2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./sql/init_auth.sql:/docker-entrypoint-initdb.d/02-init-auth.sql
    ports:
      - "15432:5432"
    networks:
      - ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_admin -d ai_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis缓存
  redis:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/redis:7-alpine
    container_name: ai-redis
    command: redis-server --requirepass ai_redis_2024
    volumes:
      - redis_data:/data
    ports:
      - "16379:6379"
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ai_redis_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-backend
    environment:
      - ENV=product
      - DATABASE_URL=postgresql://ai_admin:ai_password_2024@postgres:5432/ai_service
      - REDIS_URL=redis://:ai_redis_2024@redis:6379/0
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
    volumes:
      - ./config.json:/app/config.json
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    ports:
      - "7777:7777"
    networks:
      - ai-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ./admin_frontend
      dockerfile: Dockerfile
    container_name: ai-frontend
    ports:
      - "80:80"
    networks:
      - ai-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  ai-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
